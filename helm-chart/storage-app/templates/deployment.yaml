apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "storage-app.fullname" . }}
  labels:
    {{- include "storage-app.labels" . | nindent 4 }}
spec:
  {{- if not .Values.autoscaling.enabled }}
  replicas: {{ .Values.replicaCount }}
  {{- end }}
  selector:
    matchLabels:
      {{- include "storage-app.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      labels:
        {{- include "storage-app.selectorLabels" . | nindent 8 }}
    spec:
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      serviceAccountName: {{ include "storage-app.serviceAccountName" . }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: {{ .Chart.Name }}
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          image: "{{ .Values.image.repository }}:{{ .Values.image.tag | default .Chart.AppVersion }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          ports:
            - name: http
              containerPort: 8000
              protocol: TCP
          livenessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 30
            periodSeconds: 30
          readinessProbe:
            httpGet:
              path: /api/health
              port: http
            initialDelaySeconds: 5
            periodSeconds: 5
          env:
            - name: DATABASE_URL
              value: {{ .Values.app.database.url | quote }}
            - name: SECRET_KEY
              value: {{ .Values.app.security.secretKey | quote }}
            - name: ALGORITHM
              value: {{ .Values.app.security.algorithm | quote }}
            - name: ACCESS_TOKEN_EXPIRE_MINUTES
              value: {{ .Values.app.security.accessTokenExpireMinutes | quote }}
            - name: ENABLE_ENTRA_AUTH
              value: {{ .Values.app.auth.enableEntraAuth | quote }}
            {{- if .Values.app.auth.enableEntraAuth }}
            - name: AZURE_CLIENT_ID
              value: {{ .Values.app.auth.azureClientId | quote }}
            - name: AZURE_CLIENT_SECRET
              value: {{ .Values.app.auth.azureClientSecret | quote }}
            - name: AZURE_TENANT_ID
              value: {{ .Values.app.auth.azureTenantId | quote }}
            - name: AZURE_AUTHORITY
              value: {{ .Values.app.auth.azureAuthority | quote }}
            {{- end }}
            - name: CORS_ORIGINS
              value: {{ .Values.app.cors.origins | quote }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}